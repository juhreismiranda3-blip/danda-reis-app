name: danda_reis_app
description: "App de gestão para a escola Danda Reis - corte e costura"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # State management & navegação
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.1

  # UI e utilitários
  google_fonts: ^6.2.1
  intl: ^0.19.0
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
